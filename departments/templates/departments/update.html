{% extends 'base.html' %}

{% block content %}

<h2>Update Department</h2>

<form method="post" id="departmentForm" novalidate>

    {% csrf_token %}

    {% for field in form %}
        <div class="form-group">
            {{ field.label_tag }}
            {{ field }}
            <div class="text-danger"></div>
        </div>
    {% endfor %}

    <div id="formErrors" class="alert alert-danger d-none"></div>

    <button class="btn btn-primary">
        Update
    </button>

</form>

{% endblock %}

{% block js %}
{% load static %}
<script src="{% static 'js/department-formvalidation.js' %}"></script>
<script>
    function clearDepartmentErrors() {
        $("#formErrors").addClass("d-none").html("");
        $("#departmentForm div.text-danger").html("");
        $("#departmentForm .is-invalid").removeClass("is-invalid");
    }

    function showDepartmentErrors(errors) {
        clearDepartmentErrors();

        $.each(errors, function(field, messages) {
            if (field === "__all__") {
                $("#formErrors").removeClass("d-none").html(messages.join("<br>"));
                return;
            }

            var input = $("#departmentForm [name='" + field + "']");
            input.closest(".form-group").find(".text-danger").first().html(messages.join("<br>"));
        });
    }

    $(document).ready(function() {

        $('#departmentForm').submit(function(e) {

            e.preventDefault();

            if(!$("#departmentForm").valid()){
                return false;
             }

           clearDepartmentErrors();

            $.ajax({        
                url: "{% url 'department_ajax_update' department.id %}",
                type: "POST",
                data: $(this).serialize(),
                success: function(response) {
                    if(response.status == 'success') {
                        window.location.href = "{% url 'department_list' %}?success=updated";
                    } else {
                        showDepartmentErrors(response.errors || {});
                    }
                },
                error: function(xhr, status, error) {
                    $("#formErrors").removeClass("d-none").html("Error updating department.");
                }
            });
        });

    });

</script>
{% endblock %}
