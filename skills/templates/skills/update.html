{% extends 'base.html' %}

{% block content %}

<h2>Update Skill</h2>

<form method="post" id="skillForm">

    {% csrf_token %}

    {% for field in form %}
        <div class="form-group">
            {{ field.label_tag }}
            {{ field }}
            <div class="text-danger"></div>
        </div>
    {% endfor %}

    <div id="formErrors" class="alert alert-danger d-none"></div>

    <button class="btn btn-primary">
        Update
    </button>

</form>

{% endblock %}

{% block js %}
<script>

    function clearSkillErrors() {
        $("#formErrors").addClass("d-none").html("");
        $("#skillForm .text-danger").html("");
    }

    $("#skillForm").submit(function(e){

        e.preventDefault();
        clearSkillErrors();

        $.ajax({

            url: "{% url 'skill_ajax_update' skill.id %}",

            type: "POST",

            data: $(this).serialize(),

            success:function(response){

                if(response.status == "success"){

                    window.location.href = "{% url 'skill_list' %}?success=updated";

                } else {
                    $.each(response.errors || {}, function(field, messages) {
                        if (field === "__all__") {
                            $("#formErrors").removeClass("d-none").html(messages.join("<br>"));
                            return;
                        }
                        var input = $("#skillForm [name='" + field + "']");
                        input.closest(".form-group").find(".text-danger").first().html(messages.join("<br>"));
                    });

                }

            }

        });

    });

</script>
{% endblock %}
