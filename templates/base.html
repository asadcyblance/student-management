<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Management{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8f9fa;
        }

        .sidebar{
            min-height:100vh;
            background:#212529;
        }

        .sidebar a{
            color:white;
            text-decoration:none;
            display:block;
            padding:10px;
        }

        .sidebar a:hover{
            background:#343a40;
        }

        .sidebar a.active{
            background:#0d6efd;
            font-weight:600;
        }
    </style>

    {% block css %}{% endblock %}
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <div class="col-md-2 sidebar">

            <h4 class="text-white p-3">
                SMS
            </h4>

            <a href="{% url 'dashboard' %}" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>

            <a href="{% url 'student_list' %}" class="{% if '/students/' in request.path %}active{% endif %}">
                Students
            </a>

            <a href="{% url 'department_list' %}" class="{% if '/departments/' in request.path %}active{% endif %}">
                Departments
            </a>

            <a href="{% url 'skill_list' %}" class="{% if '/skills/' in request.path %}active{% endif %}">
                Skills
            </a>

        </div>

        <div class="col-md-10 p-4">

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-success">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            {% block content %}
            {% endblock %}

        </div>

    </div>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

{% block js %}
{% endblock %}

</body>
</html>
